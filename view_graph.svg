<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.05" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <style>
            .tooltip {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
                font-size: 12px;
                fill: #ffffff;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.2s;
            }
            .tooltip-bg {
                fill: #1f6feb;
                rx: 6;
                filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
            }
            .data-point {
                cursor: pointer;
                transition: all 0.2s ease;
            }
            .data-point:hover {
                r: 6;
            }
            .data-point:hover + .tooltip {
                opacity: 1;
            }
            .grid-line {
                stroke: #21262d;
                stroke-width: 1;
                stroke-dasharray: 4, 4;
            }
            .axis-text {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
                font-size: 11px;
                fill: #8b949e;
            }
            .title-text {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
                font-size: 16px;
                font-weight: 600;
                fill: #c9d1d9;
            }
            .line-path {
                fill: none;
                stroke: url(#lineGradient);
                stroke-width: 2.5;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            .area-path {
                fill: url(#areaGradient);
            }
        </style>
    </defs>
    
    <!-- Background -->
    <rect width="800" height="300" fill="#0d1117" rx="8"/>
    
    <!-- Title -->
